<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF6 Training Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-panel: #1a1d29;
            --accent: #00ffff;
            --accent-cyan: #00ffff;
            --accent-green: #00ff9d;
            --accent-red: #ff3860;
            --accent-orange: #ff9f43;
            --accent-purple: #bd00ff;
            --accent-yellow: #ffe600;
            --text-main: #e0e6ed;
            --text-muted: #8b9bb4;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1, h2, h3 {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-panel);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .file-upload {
            position: relative;
            display: inline-block;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 1px solid var(--accent);
            background: rgba(0, 255, 255, 0.1);
            color: var(--accent);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'Rajdhani', sans-serif;
        }

        .custom-file-upload:hover {
            background: var(--accent);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--accent);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            opacity: 0.1;
            transition: opacity 0.5s ease;
        }

        .dashboard.loaded {
            opacity: 1;
        }

        .card {
            background-color: var(--bg-panel);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 4px solid transparent;
        }

        .card-kpi {
            text-align: center;
        }

        .card-kpi h3 {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            margin: 10px 0;
        }

        .kpi-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .border-cyan { border-left-color: var(--accent-cyan); }
        .border-green { border-left-color: var(--accent-green); }
        .border-red { border-left-color: var(--accent-red); }
        .border-orange { border-left-color: var(--accent-orange); }
        .border-purple { border-left-color: var(--accent-purple); }
        .border-yellow { border-left-color: var(--accent-yellow); }

        .chart-container {
            grid-column: span 2;
            height: 350px;
            position: relative;
        }

        .chart-centered {
            grid-column: 2 / span 2;
            height: 350px;
        }

        .chart-full {
            grid-column: span 4;
            height: 400px;
        }

        .chart-half {
            grid-column: span 2;
            height: 350px;
        }

        .table-container {
            grid-column: span 4;
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-panel);
            border-radius: 8px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2d3246;
            font-size: 0.9rem;
        }

        th {
            background-color: #232736;
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }

        tr:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .detail-pill {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 2px;
            background: rgba(255,255,255,0.1);
        }
        .pill-success { border: 1px solid var(--accent-green); color: var(--accent-green); }
        .pill-fail { border: 1px solid var(--accent-red); color: var(--accent-red); }

        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }
        .text-cyan { color: var(--accent-cyan); }
        .text-orange { color: var(--accent-orange); }
        .text-purple { color: var(--accent-purple); }
        .text-yellow { color: var(--accent-yellow); }

        #empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logo-text">SF6 TRAINING DASHBOARD</div>
        <div class="file-upload">
            <label for="file-input" class="custom-file-upload">
                &#x1F4E5; UPLOAD STATS FILE
            </label>
            <input id="file-input" type="file" accept=".txt" />
        </div>
    </header>

    <div id="empty-state">
        <h2>Waiting for data...</h2>
        <p>Import your statistics file to visualize the report.</p>
    </div>

    <div class="dashboard" id="main-dashboard"></div>

    <script>
        // ========== COLORS ==========
        const C = {
            cyan: '#00ffff',
            cyanAlpha: 'rgba(0, 255, 255, 0.2)',
            green: '#00ff9d',
            greenAlpha: 'rgba(0, 255, 157, 0.2)',
            red: '#ff3860',
            orange: '#ff9f43',
            orangeAlpha: 'rgba(255, 159, 67, 0.6)',
            purple: '#bd00ff',
            purpleAlpha: 'rgba(189, 0, 255, 0.2)',
            yellow: '#ffe600',
            white: '#e0e6ed'
        };

        // ========== STATE ==========
        let activeCharts = [];

        // ========== DETECT FILE TYPE ==========
        function detectMode(filename, content) {
            // By filename
            const fn = filename.toLowerCase();
            if (fn.includes('hitconfirm')) return 'hitconfirm';
            if (fn.includes('reaction')) return 'reactions';
            if (fn.includes('postguard')) return 'postguard';

            // By content fallback
            const lines = content.trim().split('\n');
            const first = lines.find(l => l.trim().length > 0) || '';
            if (first.startsWith('DATE\tTIME\tMODE')) return 'hitconfirm';
            if (first.startsWith('DATE\tDURATION\tSCORE')) return 'postguard';
            return 'reactions';
        }

        // ========== MODE CONFIG ==========
        const modeConfig = {
            reactions: {
                accent: C.purple,
                accentVar: '--accent-purple',
                title: 'SF6 TRAINING // REACTIONS',
                shadowColor: 'rgba(189, 0, 255, 0.3)'
            },
            hitconfirm: {
                accent: C.cyan,
                accentVar: '--accent-cyan',
                title: 'SF6 TRAINING // HIT CONFIRM',
                shadowColor: 'rgba(0, 255, 255, 0.3)'
            },
            postguard: {
                accent: C.orange,
                accentVar: '--accent-orange',
                title: 'SF6 TRAINING // POST GUARD',
                shadowColor: 'rgba(255, 159, 67, 0.3)'
            }
        };

        // ========== FILE INPUT ==========
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const content = ev.target.result;
                const mode = detectMode(file.name, content);
                loadDashboard(mode, content);
            };
            reader.readAsText(file);
        });

        // ========== MAIN LOADER ==========
        function loadDashboard(mode, content) {
            // Destroy previous charts
            activeCharts.forEach(c => c.destroy());
            activeCharts = [];

            const cfg = modeConfig[mode];
            const logo = document.getElementById('logo-text');
            logo.textContent = cfg.title;
            logo.style.color = cfg.accent;
            logo.style.textShadow = '0 0 10px ' + cfg.shadowColor;

            // Update accent CSS var for table headers and upload button
            document.documentElement.style.setProperty('--accent', cfg.accent);

            const dash = document.getElementById('main-dashboard');
            dash.innerHTML = '';
            dash.classList.remove('loaded');

            let data;
            if (mode === 'reactions') data = parseReactions(content);
            else if (mode === 'hitconfirm') data = parseHitConfirm(content);
            else data = parsePostGuard(content);

            if (!data || data.length === 0) {
                alert('No valid data found in the file.');
                return;
            }

            if (mode === 'reactions') buildReactionsDashboard(dash, data);
            else if (mode === 'hitconfirm') buildHitConfirmDashboard(dash, data);
            else buildPostGuardDashboard(dash, data);

            document.getElementById('empty-state').style.display = 'none';
            dash.classList.add('loaded');
        }

        // ==========================================
        //  PARSERS
        // ==========================================

        function parseReactions(text) {
            const lines = text.trim().split('\n');
            const data = [];
            lines.forEach(line => {
                const l = line.trim();
                if (!l) return;
                const cols = l.split('\t');
                if (cols.length < 7) return;
                const score = parseInt(cols[5]);
                if (isNaN(score)) return;
                const total = parseInt(cols[6]);
                const pct = total > 0 ? (score / total) * 100 : 0;
                data.push({
                    date: cols[0],
                    duration: cols[1],
                    mode: cols[2],
                    p1: cols[3],
                    p2: cols[4],
                    score: score,
                    total: total,
                    pct: pct
                });
            });
            return data;
        }

        function parseHitConfirm(text) {
            const lines = text.trim().split('\n');
            const data = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                if (line.toUpperCase().startsWith('DATE')) continue; // skip header
                const cols = line.split('\t');
                if (cols.length < 14) continue;
                data.push({
                    date: cols[0],
                    time: cols[1],
                    fullDate: cols[0] + ' ' + cols[1],
                    mode: cols[2],
                    duration: cols[3],
                    total: parseInt(cols[4]),
                    success: parseInt(cols[5]),
                    pct_global: parseFloat(cols[6].replace('%', '')),
                    score: parseInt(cols[7]),
                    hit_tot: parseInt(cols[8]),
                    hit_ok: parseInt(cols[9]),
                    pct_hit: parseFloat(cols[10].replace('%', '')),
                    blk_tot: parseInt(cols[11]),
                    blk_ok: parseInt(cols[12]),
                    pct_blk: parseFloat(cols[13].replace('%', ''))
                });
            }
            return data;
        }

        function parsePostGuard(text) {
            const lines = text.trim().split('\n');
            const data = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                if (line.toUpperCase().startsWith('DATE')) continue; // skip header
                const cols = line.split('\t');
                if (cols.length < 5) continue;
                let details = {};
                if (cols[5]) {
                    cols[5].split('|').forEach(p => {
                        if (!p) return;
                        const [k, v] = p.split('=');
                        if (k && v) details[k] = parseInt(v);
                    });
                }
                data.push({
                    fullDate: cols[0],
                    duration: cols[1],
                    score: parseInt(cols[2]),
                    pct: parseFloat(cols[3].replace('%', '')),
                    total: parseInt(cols[4]),
                    details: details
                });
            }
            return data;
        }

        // ==========================================
        //  HELPERS
        // ==========================================

        function makeCard(classes, html) {
            const div = document.createElement('div');
            div.className = 'card ' + classes;
            div.innerHTML = html;
            return div;
        }

        function createCanvas(id) {
            const canvas = document.createElement('canvas');
            canvas.id = id;
            return canvas;
        }

        function chartDefaults() {
            return {
                responsive: true,
                maintainAspectRatio: false
            };
        }

        function gridColor() { return '#2d3246'; }

        function getRank(pct) {
            if (pct >= 95) return 'S+';
            if (pct >= 90) return 'S';
            if (pct >= 80) return 'A';
            if (pct >= 60) return 'B';
            if (pct >= 40) return 'C';
            return 'D';
        }

        // ==========================================
        //  REACTIONS DASHBOARD
        // ==========================================

        function buildReactionsDashboard(dash, data) {
            // KPIs
            const totalSessions = data.length;
            const totalScore = data.reduce((a, d) => a + d.score, 0);
            const totalAttempts = data.reduce((a, d) => a + d.total, 0);
            const avgRate = totalAttempts > 0 ? (totalScore / totalAttempts) * 100 : 0;

            const rivalCounts = {};
            data.forEach(d => { rivalCounts[d.p2] = (rivalCounts[d.p2] || 0) + 1; });
            const topRival = Object.keys(rivalCounts).reduce((a, b) => rivalCounts[a] > rivalCounts[b] ? a : b);

            dash.appendChild(makeCard('card-kpi border-purple',
                '<h3>TOTAL SESSIONS</h3><div class="kpi-value text-purple">' + totalSessions + '</div><div class="kpi-sub">Recorded</div>'));
            dash.appendChild(makeCard('card-kpi border-cyan',
                '<h3>REACTION RATE</h3><div class="kpi-value text-cyan">' + avgRate.toFixed(1) + '%</div><div class="kpi-sub">Success Avg</div>'));
            dash.appendChild(makeCard('card-kpi border-yellow',
                '<h3>TOTAL ATTEMPTS</h3><div class="kpi-value text-yellow">' + totalAttempts.toLocaleString() + '</div><div class="kpi-sub">Reactions Tested</div>'));
            dash.appendChild(makeCard('card-kpi border-red',
                '<h3>MOST PLAYED VS</h3><div class="kpi-value text-red" style="font-size:2rem">' + topRival + '</div><div class="kpi-sub">Opponent</div>'));

            // Evolution chart (full width)
            const evoCard = makeCard('chart-full border-purple', '<h3>Reaction Consistency (Evolution)</h3>');
            const evoCanvas = createCanvas('chart-evo-react');
            evoCard.appendChild(evoCanvas);
            dash.appendChild(evoCard);

            activeCharts.push(new Chart(evoCanvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.date.split(' ')[1] || d.date),
                    datasets: [{
                        label: 'Success Rate (%)',
                        data: data.map(d => d.pct),
                        borderColor: C.purple,
                        backgroundColor: C.purpleAlpha,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4
                    }]
                },
                options: {
                    ...chartDefaults(),
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 105, grid: { color: gridColor() }, ticks: { color: C.white } },
                        x: { grid: { display: false }, ticks: { color: C.white } }
                    }
                }
            }));

            // Matchup Knowledge (half width)
            const matchupData = {};
            data.forEach(d => {
                if (!matchupData[d.p2]) matchupData[d.p2] = { score: 0, total: 0 };
                matchupData[d.p2].score += d.score;
                matchupData[d.p2].total += d.total;
            });
            const matchupLabels = Object.keys(matchupData);
            const matchupRates = matchupLabels.map(k => (matchupData[k].score / matchupData[k].total) * 100);

            const matchCard = makeCard('chart-container border-cyan', '<h3>Matchup Knowledge (Success Rate by Opponent)</h3>');
            const matchCanvas = createCanvas('chart-matchup');
            matchCard.appendChild(matchCanvas);
            dash.appendChild(matchCard);

            activeCharts.push(new Chart(matchCanvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: matchupLabels,
                    datasets: [{
                        label: 'Vs Win Rate (%)',
                        data: matchupRates,
                        backgroundColor: C.cyan,
                        borderRadius: 4
                    }]
                },
                options: {
                    ...chartDefaults(),
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, max: 100, grid: { color: gridColor() }, ticks: { color: C.white } },
                        y: { ticks: { color: C.white } }
                    }
                }
            }));

            // Character Usage (half width)
            const p1Counts = {};
            data.forEach(d => { p1Counts[d.p1] = (p1Counts[d.p1] || 0) + 1; });

            const charCard = makeCard('chart-container border-yellow', '<h3>Your Character Usage</h3>');
            const charCanvas = createCanvas('chart-char');
            charCard.appendChild(charCanvas);
            dash.appendChild(charCard);

            activeCharts.push(new Chart(charCanvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(p1Counts),
                    datasets: [{
                        data: Object.values(p1Counts),
                        backgroundColor: [C.purple, C.cyan, C.yellow, C.red, C.green, C.orange],
                        borderWidth: 0
                    }]
                },
                options: {
                    ...chartDefaults(),
                    plugins: { legend: { position: 'right', labels: { color: C.white } } }
                }
            }));

            // Table
            const tableCard = makeCard('table-container border-purple', '<h3>Detailed History</h3>');
            const table = document.createElement('table');
            table.innerHTML = '<thead><tr><th>Date</th><th>Player (P1)</th><th>Vs Opponent (P2)</th><th>Score</th><th>Attempts</th><th>Rate %</th><th>Mode</th></tr></thead><tbody></tbody>';
            const tbody = table.querySelector('tbody');

            [...data].reverse().forEach(row => {
                const tr = document.createElement('tr');
                let pctColor = C.white;
                if (row.pct >= 90) pctColor = C.cyan;
                else if (row.pct < 50) pctColor = C.red;
                tr.innerHTML = '<td>' + row.date + '</td><td>' + row.p1 + '</td><td style="color:' + C.yellow + '">' + row.p2 + '</td><td>' + row.score + '</td><td>' + row.total + '</td><td style="font-weight:bold;color:' + pctColor + '">' + row.pct.toFixed(1) + '%</td><td>' + row.mode + '</td>';
                tbody.appendChild(tr);
            });

            tableCard.appendChild(table);
            dash.appendChild(tableCard);
        }

        // ==========================================
        //  HIT CONFIRM DASHBOARD
        // ==========================================

        function buildHitConfirmDashboard(dash, data) {
            // KPIs
            const totalSessions = data.length;
            const avgAcc = data.reduce((a, d) => a + d.pct_global, 0) / data.length;
            const best = data.reduce((prev, cur) => prev.score > cur.score ? prev : cur);
            const totalInputs = data.reduce((a, d) => a + d.total, 0);

            dash.appendChild(makeCard('card-kpi border-cyan',
                '<h3>TOTAL SESSIONS</h3><div class="kpi-value text-cyan">' + totalSessions + '</div><div class="kpi-sub">Played</div>'));
            dash.appendChild(makeCard('card-kpi border-green',
                '<h3>AVERAGE ACCURACY</h3><div class="kpi-value text-green">' + avgAcc.toFixed(2) + '%</div><div class="kpi-sub">Global</div>'));
            dash.appendChild(makeCard('card-kpi border-orange',
                '<h3>BEST SCORE</h3><div class="kpi-value text-orange">' + best.score + '</div><div class="kpi-sub">' + best.fullDate + '</div>'));
            dash.appendChild(makeCard('card-kpi border-red',
                '<h3>TOTAL VOLUME</h3><div class="kpi-value text-red">' + totalInputs.toLocaleString() + '</div><div class="kpi-sub">Interactions (Hits + Blocks)</div>'));

            // Accuracy Evolution (full width, 3 lines)
            const evoCard = makeCard('chart-full border-cyan', '<h3>Accuracy Evolution (%)</h3>');
            const evoCanvas = createCanvas('chart-evo-hc');
            evoCard.appendChild(evoCanvas);
            dash.appendChild(evoCard);

            activeCharts.push(new Chart(evoCanvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.date + '\n' + d.time),
                    datasets: [
                        {
                            label: 'Hit %',
                            data: data.map(d => d.pct_hit),
                            borderColor: C.orange,
                            backgroundColor: C.orange,
                            tension: 0.3
                        },
                        {
                            label: 'Block %',
                            data: data.map(d => d.pct_blk),
                            borderColor: C.cyan,
                            backgroundColor: C.cyan,
                            tension: 0.3
                        },
                        {
                            label: 'Global %',
                            data: data.map(d => d.pct_global),
                            borderColor: C.green,
                            backgroundColor: 'rgba(0, 255, 157, 0.1)',
                            fill: true,
                            tension: 0.3,
                            borderDash: [5, 5]
                        }
                    ]
                },
                options: {
                    ...chartDefaults(),
                    plugins: { legend: { labels: { color: C.white } } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: gridColor() }, ticks: { color: C.white } },
                        x: { grid: { display: false }, ticks: { color: C.white, maxRotation: 45, minRotation: 45 } }
                    }
                }
            }));

            // Hits vs Blocks Ratio (centered)
            const totHit = data.reduce((a, d) => a + d.hit_tot, 0);
            const totBlk = data.reduce((a, d) => a + d.blk_tot, 0);

            const ratioCard = makeCard('chart-centered border-green', '<h3>Hits vs Blocks (Ratio)</h3>');
            const ratioCanvas = createCanvas('chart-ratio-hc');
            ratioCard.appendChild(ratioCanvas);
            dash.appendChild(ratioCard);

            activeCharts.push(new Chart(ratioCanvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['Hits (Confirm)', 'Blocks (Safe)'],
                    datasets: [{
                        data: [totHit, totBlk],
                        backgroundColor: [C.orange, C.cyan],
                        borderWidth: 0
                    }]
                },
                options: {
                    ...chartDefaults(),
                    plugins: { legend: { position: 'bottom', labels: { color: C.white } } }
                }
            }));

            // Table
            const tableCard = makeCard('table-container border-cyan', '<h3>Session History</h3>');
            const table = document.createElement('table');
            table.innerHTML = '<thead><tr><th>Date</th><th>Mode</th><th>Score</th><th>Total Inputs</th><th>Success</th><th>Global Accuracy</th><th>Hit %</th><th>Block %</th></tr></thead><tbody></tbody>';
            const tbody = table.querySelector('tbody');

            [...data].reverse().forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + row.fullDate + '</td><td>' + row.mode + '</td><td style="font-weight:bold;color:' + C.orange + '">' + row.score + '</td><td>' + row.total + '</td><td class="text-green">' + row.success + '</td><td>' + row.pct_global.toFixed(2) + '%</td><td>' + row.pct_hit.toFixed(1) + '%</td><td>' + row.pct_blk.toFixed(1) + '%</td>';
                tbody.appendChild(tr);
            });

            tableCard.appendChild(table);
            dash.appendChild(tableCard);
        }

        // ==========================================
        //  POST GUARD DASHBOARD
        // ==========================================

        function buildPostGuardDashboard(dash, data) {
            // KPIs
            const totalSessions = data.length;
            const avgPct = data.reduce((a, d) => a + d.pct, 0) / data.length;
            const best = data.reduce((prev, cur) => prev.score > cur.score ? prev : cur);
            const totalInteractions = data.reduce((a, d) => a + d.total, 0);

            dash.appendChild(makeCard('card-kpi border-cyan',
                '<h3>TOTAL SESSIONS</h3><div class="kpi-value text-cyan">' + totalSessions + '</div><div class="kpi-sub">Played</div>'));
            dash.appendChild(makeCard('card-kpi border-green',
                '<h3>AVG SUCCESS RATE</h3><div class="kpi-value text-green">' + avgPct.toFixed(2) + '%</div><div class="kpi-sub">Global</div>'));
            dash.appendChild(makeCard('card-kpi border-orange',
                '<h3>HIGHEST SCORE</h3><div class="kpi-value text-orange">' + best.score + '</div><div class="kpi-sub">' + best.fullDate + '</div>'));
            dash.appendChild(makeCard('card-kpi border-red',
                '<h3>TOTAL INTERACTIONS</h3><div class="kpi-value text-red">' + totalInteractions.toLocaleString() + '</div><div class="kpi-sub">Defensive Actions</div>'));

            // Score History (half width bar)
            const scoreCard = makeCard('chart-half border-orange', '<h3>Score History</h3>');
            const scoreCanvas = createCanvas('chart-score-pg');
            scoreCard.appendChild(scoreCanvas);
            dash.appendChild(scoreCard);

            const labels = data.map(d => {
                const parts = d.fullDate.split(' ');
                return parts[1] || d.fullDate;
            });

            activeCharts.push(new Chart(scoreCanvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Score',
                        data: data.map(d => d.score),
                        backgroundColor: data.map(d => d.score >= 0 ? C.orange : C.red),
                        borderWidth: 0
                    }]
                },
                options: {
                    ...chartDefaults(),
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: gridColor() }, ticks: { color: C.white } },
                        x: { display: false }
                    }
                }
            }));

            // Interaction Breakdown (half width doughnut)
            let agg = {};
            data.forEach(d => {
                for (const [k, v] of Object.entries(d.details || {})) {
                    if (!agg[k]) agg[k] = 0;
                    agg[k] += v;
                }
            });

            const breakdownLabels = Object.keys(agg);
            const breakdownData = Object.values(agg);
            const breakdownColors = breakdownLabels.map(l => {
                if (l.includes('SUCCESS') || l.includes('SAFE') || l.includes('COUNTER')) return C.green;
                if (l.includes('FAIL')) return C.red;
                if (l.includes('TRADE')) return C.cyan;
                return C.orange;
            });

            const brkCard = makeCard('chart-half border-cyan', '<h3>Interaction Breakdown (Aggregate)</h3>');
            const brkCanvas = createCanvas('chart-brk-pg');
            brkCard.appendChild(brkCanvas);
            dash.appendChild(brkCard);

            activeCharts.push(new Chart(brkCanvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: breakdownLabels,
                    datasets: [{
                        data: breakdownData,
                        backgroundColor: breakdownColors,
                        borderWidth: 0
                    }]
                },
                options: {
                    ...chartDefaults(),
                    plugins: { legend: { position: 'right', labels: { color: C.white, font: { size: 11 } } } }
                }
            }));

            // Table
            const tableCard = makeCard('table-container border-orange', '<h3>Session History & Details</h3>');
            const table = document.createElement('table');
            table.innerHTML = '<thead><tr><th>Date</th><th>Duration</th><th>Score</th><th>Total</th><th>Success %</th><th>Rank</th><th>Detailed Report</th></tr></thead><tbody></tbody>';
            const tbody = table.querySelector('tbody');

            [...data].reverse().forEach(row => {
                const tr = document.createElement('tr');
                const scoreColor = row.score >= 0 ? C.green : C.red;
                const pctClass = row.pct >= 80 ? 'text-green' : (row.pct >= 50 ? 'text-orange' : 'text-red');

                let detailsHTML = '';
                for (const [key, val] of Object.entries(row.details)) {
                    const isSuccess = key.includes('SUCCESS') || key.includes('SAFE') || key.includes('COUNTER');
                    const pillClass = isSuccess ? 'pill-success' : 'pill-fail';
                    detailsHTML += '<span class="detail-pill ' + pillClass + '">' + key + ': ' + val + '</span>';
                }
                if (!detailsHTML) detailsHTML = '<span style="color:#555">No detailed data</span>';

                tr.innerHTML = '<td>' + row.fullDate + '</td><td>' + row.duration + '</td><td style="font-weight:bold;color:' + scoreColor + '">' + row.score + '</td><td>' + row.total + '</td><td class="' + pctClass + '">' + row.pct.toFixed(1) + '%</td><td>' + getRank(row.pct) + '</td><td>' + detailsHTML + '</td>';
                tbody.appendChild(tr);
            });

            tableCard.appendChild(table);
            dash.appendChild(tableCard);
        }
    </script>
</body>
</html>
